media:
  - name: images
    label: Image library
    input: public/media/images
    output: /media/images
    categories: [image]
    rename: safe
  - name: videos
    label: Video library
    input: public/media/videos
    output: /media/videos
    categories: [video]
    rename: safe

settings:
  hide: true
  content:
    merge: true
  commit:
    templates:
      create: "content: create {path}"
      update: "content: update {path}"
      delete: "content: delete {path}"
      rename: "content: rename {oldPath} to {newPath}"

components:
  seoDescription:
    label: Summary
    type: text
    required: true
    description: Short description used at the top of the page and in search and social previews. Keep it under 180 characters.
    options:
      maxlength: 180
  imageAsset:
    label: Image
    type: image
    options:
      media: images
  videoAsset:
    label: Video
    type: file
    options:
      media: videos
      categories: [video]
  bodyContent:
    label: Body
    type: rich-text
    options:
      format: markdown
      media: images

content:
  - name: settings
    label: Site settings
    type: group
    items:
      - name: site
        label: Site
        type: file
        path: src/content/site/site.yml
        operations:
          create: false
          rename: false
          delete: false
        fields:
          - name: siteTitle
            label: Site title
            type: string
            required: true
            description: Browser title fallback and the site name shown in social previews.
            options:
              maxlength: 120
          - name: siteDescription
            component: seoDescription
            label: Default site description
            description: Used as the meta description on any page that does not have its own summary.
          - name: ogImage
            component: imageAsset
            label: Default social preview
            required: false
            description: Default image used when pages are shared. Individual pages can override it.

  - name: pages
    label: Pages
    type: group
    items:
      - name: home
        label: Homepage
        type: file
        path: src/content/site/home.yml
        operations:
          create: false
          rename: false
          delete: false
        fields:
          - name: artistName
            label: Artist name
            type: string
            required: true
            description: Main name shown in the centre of the homepage.
            options:
              maxlength: 80
          - name: artistSubtitle
            label: Artist subtitle
            type: string
            required: true
            description: Short line below the artist name.
            options:
              maxlength: 120
          - name: introVideo
            component: videoAsset
            label: Intro video
            required: false
            description: Optional autoplay video shown before the homepage tree. Leave empty to skip the intro.
          - name: skipLabel
            label: Skip button label
            type: string
            required: true
            description: Very short label for the intro-video skip button.
            options:
              maxlength: 40
          - name: ogImage
            component: imageAsset
            label: Homepage social preview
            required: false
            description: Optional. Overrides the default site preview when the homepage is shared.

      - name: about
        label: About
        type: file
        path: src/content/site/about.md
        format: yaml-frontmatter
        operations:
          create: false
          rename: false
          delete: false
        fields:
          - name: summary
            component: seoDescription
            description: Short text shown at the top of the About page and used as the meta description.
          - name: body
            component: bodyContent
            description: Main About page text. Supports headings, links, and lists.

  - name: catalog
    label: Catalog
    type: group
    items:
      - name: projects
        label: Projects
        type: collection
        path: src/content/projects
        format: yaml-frontmatter
        subfolders: false
        filename:
          template: "{primary}.md"
          field: false
        view:
          fields: [title, year, category, featured]
          primary: title
          sort: [year, title, featured]
          search: [title, summary, slug]
          default:
            sort: year
            order: desc
        fields:
          - name: title
            label: Title
            type: string
            required: true
            description: Project page heading. Used to generate the file name when first created.
            options:
              maxlength: 120
          - name: slug
            label: URL slug
            type: string
            required: true
            description: Determines the project URL (/projects/<slug>/). Lowercase letters, numbers and dashes only.
            options:
              pattern: "^[a-z0-9-]+$"
          - name: year
            label: Year
            type: number
            required: true
            options:
              min: 1900
              max: 2100
          - name: category
            label: Category
            type: reference
            required: true
            description: Defines which homepage branch the project belongs to. Categories are managed in Catalog → Categories.
            options:
              collection: categories
              search: name,label
              value: "{fields.name}"
              label: "{fields.label}"
          - name: featured
            label: Show on homepage tree
            type: boolean
            default: true
            description: When enabled, the project appears under its category on the homepage.
          - name: summary
            component: seoDescription
            description: Single-sentence description shown at the top of the project page and in social previews.
          - name: body
            component: bodyContent
            required: false
            description: Optional long-form text shown below the video.
          - name: video
            component: videoAsset
            label: Project video
            required: false
            description: Optional video shown on the project page.
          - name: ogImage
            component: imageAsset
            label: Social preview
            required: false
            description: Optional. Overrides the default site preview when this project is shared.

      - name: categories
        label: Categories
        type: collection
        path: src/content/categories
        format: yaml
        subfolders: false
        filename:
          template: "{primary}.yml"
          field: false
        view:
          fields: [label, name]
          primary: label
          sort: [label]
          search: [name, label]
        fields:
          - name: name
            label: Internal name
            type: string
            required: true
            description: Stored on each project. Renaming requires updating projects that use it.
            options:
              maxlength: 60
          - name: label
            label: Display label
            type: string
            required: true
            description: Shown on the homepage branch.
            options:
              maxlength: 60
